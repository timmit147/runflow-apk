<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>RunFlow</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
html, body { height: 100%; }
body { margin: 0; background: #0b1220; font-family: system-ui; color: white; overflow: hidden; }
.header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; z-index: 500; }
.actions { display: flex; gap: 8px; }
.btn { padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: rgba(0,0,0,0.5); }
.btn.on { background: #4ade80; color: #000; border-color: #4ade80; }
.screen { display: none; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; box-sizing: border-box; position: relative; }
.active { display: flex; }
.bigbtn { width: 180px; height: 180px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; background: white; color: black; cursor: pointer; }
.timer { margin-top: 15px; font-size: 28px; font-variant-numeric: tabular-nums; }
.list { width: 80%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; max-height: 70vh; overflow-y: auto; }
.item { padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; user-select: none; -webkit-user-select: none; }
#routeMap { width: 100%; height: 100%; }
.info { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; text-align: left; font-size: 13px; background: rgba(0,0,0,0.75); padding: 15px; border-radius: 8px; line-height: 1.6; display: none; z-index: 500; }

.lock-overlay { position: fixed; inset: 0; background: #000; z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
.lock-overlay.active { display: flex; }
.lock-time { font-size: 52px; font-weight: 300; font-variant-numeric: tabular-nums; }
.lock-sub { font-size: 14px; opacity: 0.5; margin-top: 8px; }
.slide-track { position: absolute; bottom: 70px; width: 80%; max-width: 320px; height: 56px; background: rgba(255,255,255,0.08); border-radius: 28px; box-sizing: border-box; }
.slide-handle { position: absolute; left: 4px; top: 4px; width: 48px; height: 48px; border-radius: 50%; background: #fff; touch-action: none; }
.slide-label { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); text-align: center; font-size: 13px; opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <div id="navBtn" class="btn">Routes</div>
  <div class="actions">
    <div id="lockBtn" class="btn" style="display:none;">Lock</div>
    <div id="importBtn" class="btn" style="display:none;">Import</div>
    <div id="exportBtn" class="btn" style="display:none;">Export</div>
    <div id="deleteBtn" class="btn" style="display:none;">Delete</div>
  </div>
</div>

<input type="file" id="importFile" accept="application/json,.json" style="display:none;">

<div id="run" class="screen active">
  <button class="bigbtn" id="btn" onclick="toggleRun();">START</button>
  <div class="timer" id="timer">00:00:00</div>
</div>

<div id="routes" class="screen">
  <div class="list" id="list"></div>
</div>

<div id="view" class="screen">
  <div id="routeMap"></div>
  <div class="info" id="info"></div>
</div>

<div id="lockOverlay" class="lock-overlay">
  <div class="lock-time" id="lockTime">00:00:00</div>
  <div class="lock-sub" id="lockDist"></div>
  <div class="slide-track" id="slideTrack">
    <div class="slide-label">Slide to unlock</div>
    <div class="slide-handle" id="slideHandle"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* === JOUW ALGORITME (Geen wijzigingen) === */
let running = false, startTime, interval, tempRun;
const ACCURACY_MAX_MOVING = 25, ACCURACY_MAX_STATIONARY = 10, FIX_BUFFER_SIZE = 8, GEOFENCE_STATIONARY = 10, STOP_ENTER_DURATION = 10000, STOP_EXIT_DISTANCE = 15, MIN_POINT_INTERVAL = 3000, MIN_POINT_DISTANCE = 8, CONFIRM_STREAK = 4, HEADING_TOLERANCE = 55, KALMAN_PROCESS_NOISE = 4, MOTION_STILL_VARIANCE = 0.3;
let refLat = null, refLon = null, kalmanX, kalmanY, fixBuffer = [], lastConfirmedPoint = null, lastFilteredForBearing = null, bearingBuffer = [], movementStreak = 0, stopMode = false, stopAnchor = null, stillSince = null;

function toLocalXY(lat, lon){ const x = (lon - refLon) * 111320 * Math.cos(refLat * Math.PI/180); const y = (lat - refLat) * 111320; return { x, y }; }
function fromLocalXY(x, y){ return { lat: refLat + y/111320, lon: refLon + x/(111320*Math.cos(refLat*Math.PI/180)) }; }
function makeKalman(){ return { value: null, variance: -1 }; }
function kalmanUpdate(state, measurement, measurementNoise){ if(state.variance < 0){ state.value = measurement; state.variance = measurementNoise; return state.value; } state.variance += KALMAN_PROCESS_NOISE; const K = state.variance / (state.variance + measurementNoise); state.value += K * (measurement - state.value); state.variance *= (1 - K); return state.value; }
function weightedAverage(buffer){ let wSum = 0, xSum = 0, ySum = 0; buffer.forEach(f=>{ const w = 1 / Math.max(f.accuracy, 1)**2; wSum += w; xSum += f.x*w; ySum += f.y*w; }); return { x: xSum/wSum, y: ySum/wSum, accuracy: Math.sqrt(1/wSum) }; }
function bearingBetween(p1, p2){ const lat1 = p1.lat*Math.PI/180, lat2 = p2.lat*Math.PI/180; const dLon = (p2.lon-p1.lon)*Math.PI/180; const y = Math.sin(dLon)*Math.cos(lat2); const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon); return (Math.atan2(y,x)*180/Math.PI + 360) % 360; }
function angularDiff(a,b){ const d = Math.abs(a-b) % 360; return d > 180 ? 360-d : d; }
function isHeadingConsistent(bearings, tolerance){ if(bearings.length < 2) return true; for(let i=1; i<bearings.length; i++){ if(angularDiff(bearings[i], bearings[i-1]) > tolerance) return false; } return true; }
function getDistance(p1, p2) { const R = 6371e3; const r1 = p1.lat * Math.PI/180, r2 = p2.lat * Math.PI/180; const dLat = (p2.lat-p1.lat)*Math.PI/180, dLon = (p2.lon-p1.lon)*Math.PI/180; const a = Math.sin(dLat/2)**2 + Math.cos(r1)*Math.cos(r2)*Math.sin(dLon/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
function formatTime(ms){ let totalSec = Math.max(0, Math.floor(ms/1000)); let h = Math.floor(totalSec/3600); let m = Math.floor((totalSec%3600)/60); let s = totalSec%60; return h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0')+':'+s.toString().padStart(2,'0'); }

function handleGpsFix(raw){
  if(refLat === null){ refLat = raw.lat; refLon = raw.lon; }
  const accLimit = stopMode ? ACCURACY_MAX_STATIONARY : ACCURACY_MAX_MOVING;
  if(raw.accuracy != null && raw.accuracy > accLimit) return;
  const local = toLocalXY(raw.lat, raw.lon);
  fixBuffer.push({ x: local.x, y: local.y, accuracy: raw.accuracy || 15 });
  if(fixBuffer.length > FIX_BUFFER_SIZE) fixBuffer.shift();
  const avg = weightedAverage(fixBuffer);
  const fx = kalmanUpdate(kalmanX, avg.x, avg.accuracy**2);
  const fy = kalmanUpdate(kalmanY, avg.y, avg.accuracy**2);
  const filtered = fromLocalXY(fx, fy);
  filtered.t = raw.timestamp - startTime;
  const referencePoint = stopMode ? stopAnchor : (lastConfirmedPoint || filtered);
  const dist = getDistance(referencePoint, filtered);
  let headingConsistent = true;
  if(lastFilteredForBearing && dist > 1){
    const bearing = bearingBetween(lastFilteredForBearing, filtered);
    bearingBuffer.push(bearing);
    if(bearingBuffer.length > CONFIRM_STREAK) bearingBuffer.shift();
    headingConsistent = isHeadingConsistent(bearingBuffer, HEADING_TOLERANCE);
  }
  lastFilteredForBearing = filtered;
  const movingThisFix = dist > (stopMode ? 3 : 2) && headingConsistent;
  movementStreak = movingThisFix ? movementStreak + 1 : 0;
  if(!stopMode){
    if(dist < GEOFENCE_STATIONARY && !movingThisFix){
      if(stillSince === null) stillSince = raw.timestamp;
      if(raw.timestamp - stillSince >= STOP_ENTER_DURATION){ stopMode = true; stopAnchor = lastConfirmedPoint || filtered; movementStreak = 0; }
    } else { stillSince = null; }
    if(!stopMode){
      if(!lastConfirmedPoint){ tempRun.points.push(filtered); lastConfirmedPoint = filtered; }
      else {
        const dt = raw.timestamp - (startTime + lastConfirmedPoint.t);
        const d = getDistance(lastConfirmedPoint, filtered);
        if(dt >= MIN_POINT_INTERVAL && d >= MIN_POINT_DISTANCE && movementStreak >= CONFIRM_STREAK){ tempRun.points.push(filtered); lastConfirmedPoint = filtered; }
      }
    }
  } else {
    const distFromAnchor = getDistance(stopAnchor, filtered);
    if(distFromAnchor >= STOP_EXIT_DISTANCE && movementStreak >= CONFIRM_STREAK){ stopMode = false; stillSince = null; lastConfirmedPoint = filtered; tempRun.points.push(filtered); movementStreak = 0; }
  }
}

/* === NIEUWE LOGICA (Background Geolocation) === */
async function startRun() {
  running = true;
  document.getElementById("btn").innerText = "STOP";
  startTime = Date.now();
  tempRun = { start: startTime, points: [] };
  refLat = null; refLon = null; kalmanX = makeKalman(); kalmanY = makeKalman(); fixBuffer = []; lastConfirmedPoint = null; lastFilteredForBearing = null; bearingBuffer = []; movementStreak = 0; stopMode = false; stopAnchor = null; stillSince = null;

  // Gebruik de Capacitor plugin via window
  const BackgroundGeolocation = window.Capacitor.Plugins.BackgroundGeolocation;
  
  if (BackgroundGeolocation) {
    await BackgroundGeolocation.addWatcher({
        backgroundMessage: "RunFlow is bezig met tracken...",
        backgroundTitle: "RunFlow sessie actief",
        requestPermissions: true,
        stale: false,
        distanceFilter: 0 
    }, (location, error) => {
        if (error) return;
        handleGpsFix({
            lat: location.latitude,
            lon: location.longitude,
            accuracy: location.accuracy,
            speed: location.speed,
            heading: location.bearing,
            timestamp: location.time
        });
    });
  }

  interval = setInterval(()=>{
    const elapsed = Date.now()-startTime;
    document.getElementById("timer").innerText = formatTime(elapsed);
  }, 1000);
}

function toggleRun(){
  if(!running){
    startRun();
  } else {
    running = false;
    clearInterval(interval);
    
    // Stop de watcher
    const BackgroundGeolocation = window.Capacitor.Plugins.BackgroundGeolocation;
    if (BackgroundGeolocation) {
        BackgroundGeolocation.removeAllWatchers();
    }
    
    tempRun.end = Date.now();
    let runs = JSON.parse(localStorage.getItem("runs")||"[]");
    runs.unshift(tempRun);
    localStorage.setItem("runs", JSON.stringify(runs));
    document.getElementById("btn").innerText = "START";
    document.getElementById("timer").innerText = "00:00:00";
    nav("routes");
  }
}

/* Rest van je UI logica (nav, loadRuns, etc) */
function nav(screen){
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
  // ... rest van je nav functie
}
// (Zorg dat je je overige functies zoals 'loadRuns', 'showRun' hieronder laat staan)
nav("run");
</script>
</body>
</html>
