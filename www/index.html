<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>RunFlow</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
html, body { height: 100%; margin: 0; background: #0b1220; font-family: system-ui; color: white; overflow: hidden; }
.header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; z-index: 500; }
.actions { display: flex; gap: 8px; }
.btn { padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
.btn.on { background: #4ade80; color: #000; border-color: #4ade80; }
.screen { display: none; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; box-sizing: border-box; position: relative; }
.active { display: flex; }

/* Run Screen UI */
#runMap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
.run-controls { position: absolute; bottom: 50px; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; }
.timer { margin-bottom: 20px; font-size: 32px; font-variant-numeric: tabular-nums; background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 15px; backdrop-filter: blur(5px); font-weight: bold; }
.bigbtn { width: 140px; height: 140px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; background: white; color: black; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.bigbtn.stop { background: #ef4444; color: white; }

/* Lists & Info */
.list { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; max-height: 75vh; overflow-y: auto; z-index: 10; padding-top: 60px; }
.item { padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.1); cursor: pointer; display: flex; justify-content: space-between; user-select: none; -webkit-user-select: none; }
#routeMap { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
.info { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; text-align: left; font-size: 13px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; line-height: 1.5; display: none; z-index: 500; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }

/* Leaflet Popup Styling */
.leaflet-popup-content-wrapper { background: rgba(0,0,0,0.85); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; }
.leaflet-popup-tip { background: rgba(0,0,0,0.85); }
.leaflet-popup-content { margin: 10px; font-family: system-ui; font-size: 13px; line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <div id="navBtn" class="btn">Routes</div>
  <div class="actions">
    <div id="importBtn" class="btn" style="display:none;">Import</div>
    <div id="pointsBtn" class="btn" style="display:none;">Points</div>
    <div id="exportBtn" class="btn" style="display:none;">Export</div>
    <div id="deleteBtn" class="btn" style="display:none;">Delete</div>
  </div>
</div>

<input type="file" id="importFile" accept="application/json,.json" style="display:none;">

<div id="run" class="screen active">
  <div id="runMap"></div>
  <div class="run-controls">
    <div class="timer" id="timer">00:00:00</div>
    <button class="bigbtn" id="btn" onclick="toggleRun();">START</button>
  </div>
</div>

<div id="routes" class="screen">
  <div class="list" id="list"></div>
</div>

<div id="view" class="screen">
  <div id="routeMap"></div>
  <div class="info" id="info"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* === VARIABELEN & CONFIGURATIE === */
let running = false, startTime, interval, tempRun;
const ACCURACY_MAX_MOVING = 25, ACCURACY_MAX_STATIONARY = 10, FIX_BUFFER_SIZE = 8, GEOFENCE_STATIONARY = 10, STOP_ENTER_DURATION = 10000, STOP_EXIT_DISTANCE = 15, MIN_POINT_INTERVAL = 3000, MIN_POINT_DISTANCE = 8, CONFIRM_STREAK = 4, HEADING_TOLERANCE = 55, KALMAN_PROCESS_NOISE = 4;
let refLat = null, refLon = null, kalmanX, kalmanY, fixBuffer = [], lastConfirmedPoint = null, lastFilteredForBearing = null, bearingBuffer = [], movementStreak = 0, stopMode = false, stopAnchor = null, stillSince = null;
let watcherId = null, webWatchId = null, map = null, polyline = null, activeRunIndex = null, markers = [];
let liveMap = null, livePolyline = null, liveMarker = null;

let pointsLayerGroup = null;
let showingPoints = false;

const SATELLITE_URL = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';

/* === HELPER FUNCTIES === */
function toLocalXY(lat, lon){ const x = (lon - refLon) * 111320 * Math.cos(refLat * Math.PI/180); const y = (lat - refLat) * 111320; return { x, y }; }
function fromLocalXY(x, y){ return { lat: refLat + y/111320, lon: refLon + x/(111320*Math.cos(refLat*Math.PI/180)) }; }
function makeKalman(){ return { value: null, variance: -1 }; }
function kalmanUpdate(state, measurement, measurementNoise){ if(state.variance < 0){ state.value = measurement; state.variance = measurementNoise; return state.value; } state.variance += KALMAN_PROCESS_NOISE; const K = state.variance / (state.variance + measurementNoise); state.value += K * (measurement - state.value); state.variance *= (1 - K); return state.value; }
function weightedAverage(buffer){ let wSum = 0, xSum = 0, ySum = 0; buffer.forEach(f=>{ const w = 1 / Math.max(f.accuracy, 1)**2; wSum += w; xSum += f.x*w; ySum += f.y*w; }); return { x: xSum/wSum, y: ySum/wSum, accuracy: Math.sqrt(1/wSum) }; }
function bearingBetween(p1, p2){ const lat1 = p1.lat*Math.PI/180, lat2 = p2.lat*Math.PI/180; const dLon = (p2.lon-p1.lon)*Math.PI/180; const y = Math.sin(dLon)*Math.cos(lat2); const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon); return (Math.atan2(y,x)*180/Math.PI + 360) % 360; }
function angularDiff(a,b){ const d = Math.abs(a-b) % 360; return d > 180 ? 360-d : d; }
function isHeadingConsistent(bearings, tolerance){ if(bearings.length < 2) return true; for(let i=1; i<bearings.length; i++){ if(angularDiff(bearings[i], bearings[i-1]) > tolerance) return false; } return true; }
function getDistance(p1, p2) { const R = 6371e3; const r1 = p1.lat * Math.PI/180, r2 = p2.lat * Math.PI/180; const dLat = (p2.lat-p1.lat)*Math.PI/180, dLon = (p2.lon-p1.lon)*Math.PI/180; const a = Math.sin(dLat/2)**2 + Math.cos(r1)*Math.cos(r2)*Math.sin(dLon/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
function formatTime(ms){ let totalSec = Math.max(0, Math.floor(ms/1000)); let h = Math.floor(totalSec/3600); let m = Math.floor((totalSec%3600)/60); let s = totalSec%60; return h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0')+':'+s.toString().padStart(2,'0'); }

/* === GPS DATA VERWERKEN === */
function handleGpsFix(raw){
  if(tempRun && tempRun.points.length === 0) {
      refLat = raw.lat; refLon = raw.lon;
      const firstPoint = { lat: raw.lat, lon: raw.lon, t: 0 };
      tempRun.points.push(firstPoint);
      lastConfirmedPoint = firstPoint;
      if(liveMap && running) { liveMap.setView([raw.lat, raw.lon], 17); liveMarker.setLatLng([raw.lat, raw.lon]); }
  }

  const accLimit = stopMode ? ACCURACY_MAX_STATIONARY : ACCURACY_MAX_MOVING;
  if(raw.accuracy != null && raw.accuracy > accLimit) return;
  
  const local = toLocalXY(raw.lat, raw.lon);
  fixBuffer.push({ x: local.x, y: local.y, accuracy: raw.accuracy || 15 });
  if(fixBuffer.length > FIX_BUFFER_SIZE) fixBuffer.shift();
  
  const avg = weightedAverage(fixBuffer);
  const fx = kalmanUpdate(kalmanX, avg.x, avg.accuracy**2);
  const fy = kalmanUpdate(kalmanY, avg.y, avg.accuracy**2);
  const filtered = fromLocalXY(fx, fy);
  filtered.t = raw.timestamp - startTime;
  
  const referencePoint = stopMode ? stopAnchor : (lastConfirmedPoint || filtered);
  const dist = getDistance(referencePoint, filtered);
  
  let headingConsistent = true;
  if(lastFilteredForBearing && dist > 1){
    const bearing = bearingBetween(lastFilteredForBearing, filtered);
    bearingBuffer.push(bearing);
    if(bearingBuffer.length > CONFIRM_STREAK) bearingBuffer.shift();
    headingConsistent = isHeadingConsistent(bearingBuffer, HEADING_TOLERANCE);
  }
  lastFilteredForBearing = filtered;
  
  const movingThisFix = dist > (stopMode ? 3 : 2) && headingConsistent;
  movementStreak = movingThisFix ? movementStreak + 1 : 0;
  
  if(!stopMode){
    if(dist < GEOFENCE_STATIONARY && !movingThisFix){
      if(stillSince === null) stillSince = raw.timestamp;
      if(raw.timestamp - stillSince >= STOP_ENTER_DURATION){ stopMode = true; stopAnchor = lastConfirmedPoint || filtered; movementStreak = 0; }
    } else { stillSince = null; }
    
    if(!stopMode){
      const dt = raw.timestamp - (startTime + lastConfirmedPoint.t);
      const d = getDistance(lastConfirmedPoint, filtered);
      if(dt >= MIN_POINT_INTERVAL && d >= MIN_POINT_DISTANCE && movementStreak >= CONFIRM_STREAK){ 
          tempRun.points.push(filtered); 
          lastConfirmedPoint = filtered; 
          
          if(liveMap && running) {
              const ll = [filtered.lat, filtered.lon];
              const currentLatLngs = livePolyline.getLatLngs();
              currentLatLngs.push(ll);
              livePolyline.setLatLngs(currentLatLngs);
              liveMarker.setLatLng(ll);
              liveMap.setView(ll);
          }
      }
    }
  } else {
    const distFromAnchor = getDistance(stopAnchor, filtered);
    if(distFromAnchor >= STOP_EXIT_DISTANCE && movementStreak >= CONFIRM_STREAK){ 
        stopMode = false; stillSince = null; lastConfirmedPoint = filtered; 
        tempRun.points.push(filtered); movementStreak = 0; 
    }
  }
}

/* === RUN START/STOP === */
async function startRun() {
  running = true;
  const btn = document.getElementById("btn");
  btn.innerText = "STOP";
  btn.classList.add("stop");
  startTime = Date.now();
  tempRun = { start: startTime, points: [] };
  refLat = null; refLon = null; kalmanX = makeKalman(); kalmanY = makeKalman(); fixBuffer = []; lastConfirmedPoint = null; lastFilteredForBearing = null; bearingBuffer = []; movementStreak = 0; stopMode = false; stopAnchor = null; stillSince = null;

  if(!liveMap) {
      liveMap = L.map('runMap', { zoomControl: false, attributionControl: false }).setView([52.1326, 5.2913], 15);
      L.tileLayer(SATELLITE_URL, { maxZoom: 19 }).addTo(liveMap);
      livePolyline = L.polyline([], {color: '#4ade80', weight: 6, opacity: 0.9}).addTo(liveMap);
      const liveIcon = L.divIcon({ html: `<svg width="18" height="18"><circle cx="9" cy="9" r="7" fill="#3b82f6" stroke="#fff" stroke-width="2"/></svg>`, className: '', iconSize: [18,18], iconAnchor: [9,9] });
      liveMarker = L.marker([52.1326, 5.2913], {icon: liveIcon}).addTo(liveMap);
  } else {
      livePolyline.setLatLngs([]);
      liveMap.invalidateSize();
  }

  const Capacitor = window.Capacitor;
  if (Capacitor && Capacitor.Plugins && Capacitor.Plugins.BackgroundGeolocation) {
    const BackgroundGeolocation = Capacitor.Plugins.BackgroundGeolocation;
    try {
      watcherId = await BackgroundGeolocation.addWatcher({
          backgroundMessage: "RunFlow is bezig met tracken...",
          backgroundTitle: "RunFlow sessie actief",
          requestPermissions: true,
          stale: false,
          distanceFilter: 0,
          androidOptions: { foregroundService: true, notificationTitle: "RunFlow is actief", notificationText: "GPS tracking loopt op de achtergrond...", notificationIcon: "mipmap/ic_launcher" }
      }, (location, error) => {
          if (error) return;
          handleGpsFix({ lat: location.latitude, lon: location.longitude, accuracy: location.accuracy, speed: location.speed, heading: location.bearing, timestamp: location.time });
      });
    } catch (e) { console.error("Native background tracking starten mislukt", e); }
  } else {
    webWatchId = navigator.geolocation.watchPosition((pos) => {
        handleGpsFix({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy, speed: pos.coords.speed, heading: pos.coords.heading, timestamp: pos.timestamp });
    }, (err) => console.error(err), { enableHighAccuracy: true });
  }

  interval = setInterval(()=>{ document.getElementById("timer").innerText = formatTime(Date.now() - startTime); }, 1000);
}

async function toggleRun(){
  if(!running){ startRun(); } else {
    running = false;
    clearInterval(interval);
    
    const Capacitor = window.Capacitor;
    if (Capacitor && Capacitor.Plugins && Capacitor.Plugins.BackgroundGeolocation && watcherId) {
        await Capacitor.Plugins.BackgroundGeolocation.removeWatcher({ id: watcherId });
        watcherId = null;
    }
    if (webWatchId !== null) { navigator.geolocation.clearWatch(webWatchId); webWatchId = null; }
    
    tempRun.end = Date.now();
    if(tempRun.points.length === 0 && refLat !== null) { tempRun.points.push({lat: refLat, lon: refLon, t: 0}); }
    
    if(tempRun.points.length > 0) {
        let runs = JSON.parse(localStorage.getItem("runs")||"[]");
        runs.unshift(tempRun);
        localStorage.setItem("runs", JSON.stringify(runs));
    } else { alert("Geen GPS punten gevonden. Sessie niet opgeslagen."); }
    
    const btn = document.getElementById("btn");
    btn.innerText = "START"; btn.classList.remove("stop");
    document.getElementById("timer").innerText = "00:00:00";
    nav("routes");
  }
}

/* === NAVIGATIE & UI === */
function nav(screen){
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
  const target = document.getElementById(screen);
  if(target) target.classList.add("active");
  document.getElementById("navBtn").innerText = (screen === "run") ? "Routes" : "Home";
  
  document.getElementById("importBtn").style.display = (screen === 'routes') ? 'block' : 'none';
  document.getElementById("pointsBtn").style.display = (screen === 'view') ? 'block' : 'none';
  document.getElementById("exportBtn").style.display = (screen === 'view') ? 'block' : 'none';
  document.getElementById("deleteBtn").style.display = (screen === 'view') ? 'block' : 'none';
  
  if(screen !== 'view' && pointsLayerGroup && map) {
      pointsLayerGroup.clearLayers(); showingPoints = false; document.getElementById("pointsBtn").classList.remove("on");
  }
  
  if(screen === "routes") loadRuns();
  if(screen === "run" && liveMap) { setTimeout(() => liveMap.invalidateSize(), 100); }
}

document.getElementById("navBtn").onclick = () => {
  if(document.querySelector(".screen.active").id === "run") nav("routes");
  else { document.getElementById("info").style.display = "none"; nav("run"); }
};

/* === HISTORIE & ROUTE VIEW === */
function loadRuns(){
  const listEl = document.getElementById("list");
  listEl.innerHTML = "";
  let runs = JSON.parse(localStorage.getItem("runs")||"[]");
  if(runs.length === 0) { listEl.innerHTML = "<div style='text-align:center; opacity:0.5; margin-top:20px;'>Nog geen hardloopsessies.</div>"; return; }
  runs.forEach((run, index) => {
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `<span>Sessie ${runs.length - index} (${new Date(run.start).toLocaleDateString()})</span><span>${formatTime(run.end - run.start)}</span>`;
    item.onclick = () => showRun(index);
    listEl.appendChild(item);
  });
}

function showRun(index){
  activeRunIndex = index;
  let runs = JSON.parse(localStorage.getItem("runs")||"[]");
  const run = runs[index];
  nav("view");
  
  if(!map) {
    map = L.map('routeMap', { zoomControl: false, attributionControl: false }).setView([0,0], 15);
    L.tileLayer(SATELLITE_URL, { maxZoom: 19 }).addTo(map);
    polyline = L.polyline([], {color: '#4ade80', weight: 6, opacity: 0.9}).addTo(map);
    pointsLayerGroup = L.layerGroup().addTo(map);
  }
  
  markers.forEach(m => map.removeLayer(m));
  markers = []; pointsLayerGroup.clearLayers(); showingPoints = false; document.getElementById("pointsBtn").classList.remove("on");
  setTimeout(() => { map.invalidateSize(); }, 100);

  if(run.points && run.points.length > 0) {
    const latlngs = run.points.map(p => [p.lat, p.lon]);
    polyline.setLatLngs(latlngs);
    map.fitBounds(polyline.getBounds(), { padding: [50, 50] });

    const startIcon = L.divIcon({ html: `<svg width="24" height="24"><circle cx="12" cy="12" r="10" fill="#4ade80" stroke="#000" stroke-width="2"/></svg>`, className: '', iconSize: [24,24], iconAnchor: [12,12] });
    markers.push(L.marker(latlngs[0], {icon: startIcon}).addTo(map));
    
    if(latlngs.length > 1) {
        const endIcon = L.divIcon({ html: `<svg width="24" height="24"><circle cx="12" cy="12" r="10" fill="#ef4444" stroke="#000" stroke-width="2"/></svg>`, className: '', iconSize: [24,24], iconAnchor: [12,12] });
        markers.push(L.marker(latlngs[latlngs.length-1], {icon: endIcon}).addTo(map));
    }
  } else { polyline.setLatLngs([]); }
  
  let totalDist = 0;
  if(run.points) { for(let i=1; i<run.points.length; i++) { totalDist += getDistance(run.points[i-1], run.points[i]); } }
  
  document.getElementById("info").style.display = "block";
  document.getElementById("info").innerHTML = `
    <strong>Datum:</strong> ${new Date(run.start).toLocaleString()}<br>
    <strong>Duur:</strong> ${formatTime(run.end - run.start)}<br>
    <strong>Afstand:</strong> ${(totalDist/1000).toFixed(2)} km<br>
    <strong>Datapunten:</strong> ${run.points ? run.points.length : 0}
  `;
}

/* === PUNTEN TOGGLE LOGICA === */
document.getElementById("pointsBtn").onclick = () => {
  if(activeRunIndex === null) return;
  showingPoints = !showingPoints;
  const btn = document.getElementById("pointsBtn");
  
  if(showingPoints) {
    btn.classList.add("on");
    let runs = JSON.parse(localStorage.getItem("runs")||"[]");
    const run = runs[activeRunIndex];
    let cumulativeDist = 0;
    
    run.points.forEach((p, i) => {
        if(i > 0) cumulativeDist += getDistance(run.points[i-1], p);
        const circle = L.circleMarker([p.lat, p.lon], { radius: 6, color: '#ffffff', weight: 2, fillColor: '#3b82f6', fillOpacity: 0.9 });
        circle.bindPopup(`<strong>Punt ${i + 1}</strong><br>Tijd bereikt: ${formatTime(p.t)}<br>Afstand tot nu: ${(cumulativeDist/1000).toFixed(2)} km`);
        pointsLayerGroup.addLayer(circle);
    });
  } else {
    btn.classList.remove("on");
    pointsLayerGroup.clearLayers();
  }
};

/* === DATA BEHEER (Delete, Import, Export via Filesystem) === */
document.getElementById("deleteBtn").onclick = () => {
  if(activeRunIndex !== null && confirm("Sessie definitief verwijderen?")) {
    let runs = JSON.parse(localStorage.getItem("runs")||"[]");
    runs.splice(activeRunIndex, 1);
    localStorage.setItem("runs", JSON.stringify(runs));
    document.getElementById("info").style.display = "none";
    nav("routes");
  }
};

document.getElementById("importBtn").onclick = () => { document.getElementById("importFile").click(); };
document.getElementById("importFile").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const run = JSON.parse(evt.target.result);
      if(!run.start || !run.points) throw new Error();
      let runs = JSON.parse(localStorage.getItem("runs")||"[]");
      runs.unshift(run);
      localStorage.setItem("runs", JSON.stringify(runs));
      loadRuns();
    } catch(err) { alert("Ongeldig RunFlow JSON bestand."); }
    e.target.value = '';
  };
  reader.readAsText(file);
};

document.getElementById("exportBtn").onclick = async () => {
  if (activeRunIndex === null) return;
  
  let runs = JSON.parse(localStorage.getItem("runs")||"[]");
  const run = runs[activeRunIndex];
  const fileName = `runflow-${run.start}.json`;
  const dataStr = JSON.stringify(run);

  // Maak een 'File' object aan dat je telefoon begrijpt
  const file = new File([dataStr], fileName, { type: "application/json" });

  // Gebruik de Web Share API (native Android deelmenu)
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'RunFlow Export',
        text: 'Hier is mijn hardloopsessie'
      });
    } catch (err) {
      console.error("Delen mislukt", err);
      // Fallback naar download als delen geannuleerd wordt
      downloadBlob(dataStr, fileName);
    }
  } else {
    // Fallback als delen niet wordt ondersteund
    downloadBlob(dataStr, fileName);
  }
};

function downloadBlob(dataStr, fileName) {
  const blob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const dl = document.createElement('a');
  dl.href = url;
  dl.download = fileName;
  dl.click();
  URL.revokeObjectURL(url);
}



// Start de app
nav("run");
</script>
</body>
</html>
