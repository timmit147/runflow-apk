<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>RunFlow</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
html, body { height: 100%; }
body { margin: 0; background: #0b1220; font-family: system-ui; color: white; overflow: hidden; }
.header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; z-index: 500; }
.actions { display: flex; gap: 8px; }
.btn { padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: rgba(0,0,0,0.5); }
.btn.on { background: #4ade80; color: #000; border-color: #4ade80; }
.screen { display: none; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; box-sizing: border-box; position: relative; }
.active { display: flex; }
.bigbtn { width: 180px; height: 180px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; background: white; color: black; cursor: pointer; }
.timer { margin-top: 15px; font-size: 28px; font-variant-numeric: tabular-nums; }
.list { width: 80%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; max-height: 70vh; overflow-y: auto; }
.item { padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; user-select: none; -webkit-user-select: none; }
#routeMap { width: 100%; height: 100%; }
.info { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; text-align: left; font-size: 13px; background: rgba(0,0,0,0.75); padding: 15px; border-radius: 8px; line-height: 1.6; display: none; z-index: 500; }

/* Lock screen: black, minimalistic, low power, hard to unlock by accident */
.lock-overlay {
  position: fixed; inset: 0; background: #000; z-index: 999;
  display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff;
}
.lock-overlay.active { display: flex; }
.lock-time { font-size: 52px; font-weight: 300; font-variant-numeric: tabular-nums; }
.lock-sub { font-size: 14px; opacity: 0.5; margin-top: 8px; }
.slide-track {
  position: absolute; bottom: 70px; width: 80%; max-width: 320px; height: 56px;
  background: rgba(255,255,255,0.08); border-radius: 28px; box-sizing: border-box;
}
.slide-handle {
  position: absolute; left: 4px; top: 4px; width: 48px; height: 48px; border-radius: 50%;
  background: #fff; touch-action: none;
}
.slide-label {
  position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
  text-align: center; font-size: 13px; opacity: 0.5; pointer-events: none;
}
</style>
</head>
<body>

<div class="header">
  <div id="navBtn" class="btn">Routes</div>
  <div class="actions">
    <div id="lockBtn" class="btn" style="display:none;">Lock</div>
    <div id="importBtn" class="btn" style="display:none;">Import</div>
    <div id="exportBtn" class="btn" style="display:none;">Export</div>
    <div id="deleteBtn" class="btn" style="display:none;">Delete</div>
  </div>
</div>

<input type="file" id="importFile" accept="application/json,.json" style="display:none;">

<div id="run" class="screen active">
  <button class="bigbtn" id="btn" onclick="toggleRun();">START</button>
  <div class="timer" id="timer">00:00:00</div>
</div>

<div id="routes" class="screen">
  <div class="list" id="list"></div>
</div>

<div id="view" class="screen">
  <div id="routeMap"></div>
  <div class="info" id="info"></div>
</div>

<div id="lockOverlay" class="lock-overlay">
  <div class="lock-time" id="lockTime">00:00:00</div>
  <div class="lock-sub" id="lockDist"></div>
  <div class="slide-track" id="slideTrack">
    <div class="slide-label">Slide to unlock</div>
    <div class="slide-handle" id="slideHandle"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
let running = false, startTime, interval, tempRun, watchId;

/* =====================================================================
   REAL-TIME GPS PROCESSING PIPELINE
   Goal: kill "ghost movement" almost entirely.
   Pipeline per raw fix:
     1. accuracy gate (stricter while standing still)
     2. windowed weighted average of the last 5-10 fixes
     3. per-axis Kalman filter (in local meters, not raw degrees)
     4. heading-consistency check (rejects fixes that don't move in a
        believable, sustained direction)
     5. device-motion check (accelerometer says "not moving" -> trust that)
     6. a 10m geofence + 10s dwell time to enter "stop mode"; once in
        stop mode the route is frozen and can only resume after 15m of
        confirmed real movement (hysteresis, prevents flapping)
     7. a point is only committed to the route after BOTH >=3s and >=8m
        of movement, confirmed over 3-5 consecutive fixes in a row
   ===================================================================== */

// -- tunable constants --
const ACCURACY_MAX_MOVING = 25;      // m, reject fixes worse than this while moving
const ACCURACY_MAX_STATIONARY = 10;  // m, stricter while standing still
const FIX_BUFFER_SIZE = 8;           // fixes averaged together (5-10 range)
const GEOFENCE_STATIONARY = 10;      // m, geofence radius used to detect "standing still"
const STOP_ENTER_DURATION = 10000;   // ms of stillness before pause kicks in
const STOP_EXIT_DISTANCE = 15;       // m of confirmed movement needed to leave pause
const MIN_POINT_INTERVAL = 3000;     // ms, minimum time between saved points
const MIN_POINT_DISTANCE = 8;        // m, minimum distance between saved points
const CONFIRM_STREAK = 4;            // consecutive confirmed-movement fixes required (3-5)
const HEADING_TOLERANCE = 55;        // degrees of allowed bearing drift between fixes
const KALMAN_PROCESS_NOISE = 4;      // m^2, how quickly the filter trusts new movement
const MOTION_STILL_VARIANCE = 0.3;   // accelerometer variance threshold for "not moving"

// -- per-run state (reset in startRun) --
let refLat = null, refLon = null;         // local projection origin
let kalmanX, kalmanY;                     // Kalman filter state, in local meters
let fixBuffer = [];                       // rolling buffer of recent raw fixes (local coords)
let lastConfirmedPoint = null;            // last point actually committed to the route
let lastFilteredForBearing = null;
let bearingBuffer = [];
let movementStreak = 0;
let stopMode = false;
let stopAnchor = null;
let stillSince = null;

// -- device motion (accelerometer) stillness detection --
let deviceStationary = false;
let motionSamples = [];

function toLocalXY(lat, lon){
  const x = (lon - refLon) * 111320 * Math.cos(refLat * Math.PI/180);
  const y = (lat - refLat) * 111320;
  return { x, y };
}
function fromLocalXY(x, y){
  return {
    lat: refLat + y/111320,
    lon: refLon + x/(111320*Math.cos(refLat*Math.PI/180))
  };
}

function makeKalman(){ return { value: null, variance: -1 }; }
function kalmanUpdate(state, measurement, measurementNoise){
  if(state.variance < 0){
    state.value = measurement;
    state.variance = measurementNoise;
    return state.value;
  }
  state.variance += KALMAN_PROCESS_NOISE;
  const K = state.variance / (state.variance + measurementNoise);
  state.value += K * (measurement - state.value);
  state.variance *= (1 - K);
  return state.value;
}

function weightedAverage(buffer){
  let wSum = 0, xSum = 0, ySum = 0;
  buffer.forEach(f=>{
    const w = 1 / Math.max(f.accuracy, 1)**2;
    wSum += w; xSum += f.x*w; ySum += f.y*w;
  });
  return { x: xSum/wSum, y: ySum/wSum, accuracy: Math.sqrt(1/wSum) };
}

function bearingBetween(p1, p2){
  const lat1 = p1.lat*Math.PI/180, lat2 = p2.lat*Math.PI/180;
  const dLon = (p2.lon-p1.lon)*Math.PI/180;
  const y = Math.sin(dLon)*Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}
function angularDiff(a,b){
  const d = Math.abs(a-b) % 360;
  return d > 180 ? 360-d : d;
}
function isHeadingConsistent(bearings, tolerance){
  if(bearings.length < 2) return true;
  for(let i=1; i<bearings.length; i++){
    if(angularDiff(bearings[i], bearings[i-1]) > tolerance) return false;
  }
  return true;
}

function handleDeviceMotion(event){
  const acc = event.acceleration || event.accelerationIncludingGravity;
  if(!acc) return;
  const mag = Math.sqrt((acc.x||0)**2 + (acc.y||0)**2 + (acc.z||0)**2);
  const now = Date.now();
  motionSamples.push({ mag, t: now });
  motionSamples = motionSamples.filter(s => now - s.t <= 2000);
  if(motionSamples.length >= 5){
    const mags = motionSamples.map(s=>s.mag);
    const mean = mags.reduce((a,b)=>a+b,0)/mags.length;
    const variance = mags.reduce((a,b)=>a+(b-mean)**2,0)/mags.length;
    deviceStationary = variance < MOTION_STILL_VARIANCE;
  }
}

function setupDeviceMotion(){
  if(typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function"){
    DeviceMotionEvent.requestPermission().then(state=>{
      if(state === "granted") window.addEventListener("devicemotion", handleDeviceMotion);
    }).catch(()=>{});
  } else if(typeof DeviceMotionEvent !== "undefined"){
    window.addEventListener("devicemotion", handleDeviceMotion);
  }
}
function teardownDeviceMotion(){
  window.removeEventListener("devicemotion", handleDeviceMotion);
  deviceStationary = false;
  motionSamples = [];
}

function handleGpsFix(raw){
  if(refLat === null){ refLat = raw.lat; refLon = raw.lon; }

  const accLimit = stopMode ? ACCURACY_MAX_STATIONARY : ACCURACY_MAX_MOVING;
  if(raw.accuracy != null && raw.accuracy > accLimit) return; // reject inaccurate fix

  const local = toLocalXY(raw.lat, raw.lon);
  fixBuffer.push({ x: local.x, y: local.y, accuracy: raw.accuracy || 15 });
  if(fixBuffer.length > FIX_BUFFER_SIZE) fixBuffer.shift();
  const avg = weightedAverage(fixBuffer);

  const fx = kalmanUpdate(kalmanX, avg.x, avg.accuracy**2);
  const fy = kalmanUpdate(kalmanY, avg.y, avg.accuracy**2);
  const filtered = fromLocalXY(fx, fy);
  filtered.t = raw.timestamp - startTime;

  const referencePoint = stopMode ? stopAnchor : (lastConfirmedPoint || filtered);
  const dist = getDistance(referencePoint, filtered);

  let headingConsistent = true;
  if(lastFilteredForBearing && dist > 1){
    const bearing = bearingBetween(lastFilteredForBearing, filtered);
    bearingBuffer.push(bearing);
    if(bearingBuffer.length > CONFIRM_STREAK) bearingBuffer.shift();
    headingConsistent = isHeadingConsistent(bearingBuffer, HEADING_TOLERANCE);
  }
  lastFilteredForBearing = filtered;

  const movingThisFix = dist > (stopMode ? 3 : 2) && headingConsistent && !deviceStationary;
  movementStreak = movingThisFix ? movementStreak + 1 : 0;

  if(!stopMode){
    if(dist < GEOFENCE_STATIONARY && !movingThisFix){
      if(stillSince === null) stillSince = raw.timestamp;
      if(deviceStationary || (raw.timestamp - stillSince >= STOP_ENTER_DURATION)){
        stopMode = true;
        stopAnchor = lastConfirmedPoint || filtered;
        movementStreak = 0;
      }
    } else {
      stillSince = null;
    }

    if(!stopMode){
      if(!lastConfirmedPoint){
        tempRun.points.push(filtered);
        lastConfirmedPoint = filtered;
      } else {
        const dt = raw.timestamp - (startTime + lastConfirmedPoint.t);
        const d = getDistance(lastConfirmedPoint, filtered);
        if(dt >= MIN_POINT_INTERVAL && d >= MIN_POINT_DISTANCE && movementStreak >= CONFIRM_STREAK){
          tempRun.points.push(filtered);
          lastConfirmedPoint = filtered;
        }
      }
    }
  } else {
    const distFromAnchor = getDistance(stopAnchor, filtered);
    if(distFromAnchor >= STOP_EXIT_DISTANCE && movementStreak >= CONFIRM_STREAK && !deviceStationary){
      stopMode = false;
      stillSince = null;
      lastConfirmedPoint = filtered;
      tempRun.points.push(filtered); // resume the route cleanly from here
      movementStreak = 0;
    }
    // otherwise: frozen at stopAnchor, no ghost points added
  }
}

/* ---------- State ---------- */
let selected = [];
let highlightedRange = [];
let currentRun = null;
let displayPoints = [];
let routeMap = null;
let routeLayerGroup = null;
let activeLineLayer = null;
let dotMarkers = [];
let viewingLiveRun = false;
let liveViewInterval = null;
let liveMapInitialized = false;

/* ---------- Helpers ---------- */
function pad(n){ return n.toString().padStart(2,'0'); }

function formatTime(ms){
  let totalSec = Math.max(0, Math.floor(ms/1000));
  let h = Math.floor(totalSec/3600);
  let m = Math.floor((totalSec%3600)/60);
  let s = totalSec%60;
  return pad(h)+':'+pad(m)+':'+pad(s);
}

function getDistance(p1, p2) {
  const R = 6371e3;
  const r1 = p1.lat * Math.PI/180, r2 = p2.lat * Math.PI/180;
  const dLat = (p2.lat-p1.lat)*Math.PI/180, dLon = (p2.lon-p1.lon)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(r1)*Math.cos(r2)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function centroid(points){
  let latSum = 0, lonSum = 0;
  points.forEach(p=>{ latSum += p.lat; lonSum += p.lon; });
  return { lat: latSum/points.length, lon: lonSum/points.length };
}

/* Extra safety net for old/imported routes that didn't go through the new pipeline */
function mergeClosePoints(points, thresholdMeters){
  if(!points.length) return points;
  const merged = [];
  let cluster = [points[0]];
  for(let i=1; i<points.length; i++){
    const c = centroid(cluster);
    if(getDistance(c, points[i]) <= thresholdMeters){
      cluster.push(points[i]);
    } else {
      const avg = centroid(cluster);
      merged.push({ lat: avg.lat, lon: avg.lon, t: cluster[0].t });
      cluster = [points[i]];
    }
  }
  const avg = centroid(cluster);
  merged.push({ lat: avg.lat, lon: avg.lon, t: cluster[0].t });
  return merged;
}

function liveDistanceMeters(){
  if(!tempRun) return 0;
  let d = 0;
  for(let j=1; j<tempRun.points.length; j++) d += getDistance(tempRun.points[j-1], tempRun.points[j]);
  return d;
}

/* ---------- Navigation ---------- */
function nav(screen){
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
  const navBtn = document.getElementById("navBtn");
  const lockBtn = document.getElementById("lockBtn");
  const importBtn = document.getElementById("importBtn");
  const exportBtn = document.getElementById("exportBtn");
  const deleteBtn = document.getElementById("deleteBtn");
  lockBtn.style.display = "none";
  importBtn.style.display = "none";
  exportBtn.style.display = "none";
  deleteBtn.style.display = "none";

  if(screen === "run"){
    navBtn.innerText = "Routes";
    navBtn.onclick = () => nav("routes");
    lockBtn.style.display = "block";
  } else if(screen === "routes"){
    navBtn.innerText = "Start";
    navBtn.onclick = () => nav("run");
    importBtn.style.display = "block";
    loadRuns();
  } else if(screen === "view"){
    navBtn.innerText = "Back";
    navBtn.onclick = () => nav("routes");
    exportBtn.style.display = "block";
    deleteBtn.style.display = "block";
  }
}

/* ---------- Recording a run ---------- */
function startRun(){
  running = true;
  document.getElementById("btn").innerText = "STOP";
  startTime = Date.now();
  tempRun = { start: startTime, points: [] };

  refLat = null; refLon = null;
  kalmanX = makeKalman(); kalmanY = makeKalman();
  fixBuffer = [];
  lastConfirmedPoint = null;
  lastFilteredForBearing = null;
  bearingBuffer = [];
  movementStreak = 0;
  stopMode = false;
  stopAnchor = null;
  stillSince = null;

  setupDeviceMotion();

  interval = setInterval(()=>{
    const elapsed = Date.now()-startTime;
    document.getElementById("timer").innerText = formatTime(elapsed);

    const liveCard = document.getElementById("liveCard");
    if(liveCard){
      liveCard.querySelector(".liveDist").innerText = (liveDistanceMeters()/1000).toFixed(2) + " km";
      liveCard.querySelector(".liveTime").innerText = formatTime(elapsed);
    }
    if(document.getElementById("lockOverlay").classList.contains("active")){
      document.getElementById("lockTime").innerText = formatTime(elapsed);
      document.getElementById("lockDist").innerText = (liveDistanceMeters()/1000).toFixed(2) + " km";
    }
  }, 1000);

  watchId = navigator.geolocation.watchPosition(p=>{
    handleGpsFix({
      lat: p.coords.latitude,
      lon: p.coords.longitude,
      accuracy: p.coords.accuracy,
      speed: p.coords.speed,
      heading: p.coords.heading,
      timestamp: p.timestamp || Date.now()
    });
  }, null, { enableHighAccuracy: true });
}

function toggleRun(){
  if(!running){
    startRun();
  } else {
    running = false;
    clearInterval(interval);
    navigator.geolocation.clearWatch(watchId);
    teardownDeviceMotion();
    tempRun.end = Date.now();
    let runs = JSON.parse(localStorage.getItem("runs")||"[]");
    runs.unshift(tempRun);
    localStorage.setItem("runs", JSON.stringify(runs));
    document.getElementById("btn").innerText = "START";
    document.getElementById("timer").innerText = "00:00:00";
    if(viewingLiveRun){
      clearInterval(liveViewInterval);
      liveViewInterval = null;
      viewingLiveRun = false;
    }
    nav("routes");
  }
}

/* ---------- Lock screen (fullscreen, slide to unlock) ---------- */
function showLock(){
  document.getElementById("lockOverlay").classList.add("active");
  document.getElementById("slideHandle").style.left = "4px";
  requestAppFullscreen();
  if(running){
    document.getElementById("lockTime").innerText = formatTime(Date.now()-startTime);
    document.getElementById("lockDist").innerText = (liveDistanceMeters()/1000).toFixed(2) + " km";
  } else {
    document.getElementById("lockTime").innerText = "00:00:00";
    document.getElementById("lockDist").innerText = "";
  }
}

function hideLock(){
  document.getElementById("lockOverlay").classList.remove("active");
  if(document.exitFullscreen && document.fullscreenElement){
    document.exitFullscreen().catch(()=>{});
  }
}

document.getElementById("lockBtn").onclick = showLock;

document.addEventListener("fullscreenchange", ()=>{
  if(!document.fullscreenElement){
    document.getElementById("lockOverlay").classList.remove("active");
  }
});

/* ---------- Fullscreen by default ----------
   Browsers won't allow auto-fullscreen without a user gesture, so we
   request it on the very first tap anywhere in the app. On an installed
   PWA (see manifest.json, display: "fullscreen") it opens fullscreen
   automatically without needing this at all. */
function requestAppFullscreen(){
  if(document.documentElement.requestFullscreen && !document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  }
}
document.addEventListener("pointerdown", function firstTouch(){
  requestAppFullscreen();
  document.removeEventListener("pointerdown", firstTouch);
}, { once: true });

/* Slide-to-unlock: requires a deliberate drag, so it can't be triggered by accident */
(function(){
  const handle = document.getElementById("slideHandle");
  const track = document.getElementById("slideTrack");
  let dragging = false, startX = 0, handleStartLeft = 0;

  function clientX(e){ return e.touches ? e.touches[0].clientX : e.clientX; }

  function onDown(e){
    dragging = true;
    startX = clientX(e);
    handleStartLeft = handle.offsetLeft;
  }
  function onMove(e){
    if(!dragging) return;
    const maxLeft = track.clientWidth - handle.offsetWidth - 8;
    let newLeft = handleStartLeft + (clientX(e) - startX);
    newLeft = Math.max(4, Math.min(maxLeft, newLeft));
    handle.style.left = newLeft + "px";
  }
  function onUp(){
    if(!dragging) return;
    dragging = false;
    const maxLeft = track.clientWidth - handle.offsetWidth - 8;
    if(handle.offsetLeft >= maxLeft * 0.85){
      hideLock();
    } else {
      handle.style.left = "4px";
    }
  }

  handle.addEventListener("pointerdown", onDown);
  window.addEventListener("pointermove", onMove);
  window.addEventListener("pointerup", onUp);
})();

/* ---------- Runs list ---------- */
function loadRuns(){
  let runs = JSON.parse(localStorage.getItem("runs")||"[]");
  const list = document.getElementById("list");
  list.innerHTML = "";

  if(running){
    const live = document.createElement("div");
    live.id = "liveCard";
    live.className = "item";
    live.style.background = "rgba(74,222,128,0.15)";
    live.style.border = "1px solid #4ade80";
    live.innerHTML = `<span>&#128994; LIVE</span><span><span class="liveDist">${(liveDistanceMeters()/1000).toFixed(2)} km</span> &middot; <span class="liveTime">${formatTime(Date.now()-startTime)}</span></span>`;
    live.onclick = () => showLiveRun();
    list.appendChild(live);
  }

  if(runs.length === 0 && !running){
    list.innerHTML += '<div style="opacity:0.5;text-align:center;">No runs yet</div>';
    return;
  }

  runs.forEach((r)=>{
    let totalDist = 0;
    for(let j=1; j<r.points.length; j++) totalDist += getDistance(r.points[j-1], r.points[j]);
    let durationMs = (r.end||Date.now()) - r.start;
    let d = new Date(r.start);
    let dateStr = pad(d.getDate())+'/'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());

    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span>${dateStr}</span><span>${(totalDist/1000).toFixed(2)} km &middot; ${formatTime(durationMs)}</span>`;
    div.onclick = () => showRun(r);
    list.appendChild(div);
  });
}

/* ---------- Import a route ---------- */
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const run = JSON.parse(ev.target.result);
      if(!run.points || !Array.isArray(run.points) || run.points.length === 0){
        throw new Error("invalid");
      }
      if(!run.start) run.start = Date.now();
      let runs = JSON.parse(localStorage.getItem("runs")||"[]");
      runs.unshift(run);
      localStorage.setItem("runs", JSON.stringify(runs));
      loadRuns();
    } catch(err){
      alert("Could not import this file, it's not a valid RunFlow file.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

/* ---------- Live map (route in progress) ---------- */
function showLiveRun(){
  if(!running) return;
  nav("view");
  viewingLiveRun = true;
  currentRun = null;
  liveMapInitialized = false;
  document.getElementById("exportBtn").style.display = "none";
  document.getElementById("deleteBtn").style.display = "none";
  document.getElementById("info").style.display = "none";
  document.getElementById("navBtn").innerText = "Back";
  document.getElementById("navBtn").onclick = ()=>{
    clearInterval(liveViewInterval);
    liveViewInterval = null;
    viewingLiveRun = false;
    nav("routes");
  };

  renderLiveMap();
  liveViewInterval = setInterval(renderLiveMap, 2000);
}

function renderLiveMap(){
  const points = tempRun ? tempRun.points : [];
  if(!routeMap){
    routeMap = L.map("routeMap", { zoomControl: false, attributionControl: false });
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 19
    }).addTo(routeMap);
    routeMap.on("click", onMapClick);
  }
  if(routeLayerGroup){ routeMap.removeLayer(routeLayerGroup); }
  if(points.length === 0) return;

  const latlngs = points.map(p => [p.lat, p.lon]);
  const line = L.polyline(latlngs, { color: "#4ade80", weight: 3 });
  const current = L.circleMarker(latlngs[latlngs.length-1], { radius: 7, color: "#fff", weight: 2, fillColor: "#4ade80", fillOpacity: 1 });
  routeLayerGroup = L.featureGroup([line, current]).addTo(routeMap);

  if(!liveMapInitialized){
    routeMap.setView(latlngs[latlngs.length-1], 17);
    liveMapInitialized = true;
  } else {
    routeMap.panTo(latlngs[latlngs.length-1]);
  }
}

/* ---------- Route view (satellite map, saved routes) ---------- */
function showRun(run){
  nav("view");
  viewingLiveRun = false;
  currentRun = run;
  selected = [];
  highlightedRange = [];
  dotMarkers = [];
  const info = document.getElementById("info");
  info.innerHTML = "";
  info.style.display = "none";

  displayPoints = mergeClosePoints(run.points, 8);

  if(!routeMap){
    routeMap = L.map("routeMap", { zoomControl: false, attributionControl: false });
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 19
    }).addTo(routeMap);
    routeMap.on("click", onMapClick);
  }

  if(routeLayerGroup){ routeMap.removeLayer(routeLayerGroup); }
  if(activeLineLayer){ routeMap.removeLayer(activeLineLayer); activeLineLayer = null; }

  const latlngs = displayPoints.map(p => [p.lat, p.lon]);
  const line = L.polyline(latlngs, { color: "#ffffff", weight: 2, opacity: 0.6 });

  const markers = displayPoints.map((p,i)=>{
    const m = L.circleMarker([p.lat, p.lon], { radius: 5, color: "#fff", weight: 1, fillColor: "#fff", fillOpacity: 0.9 });
    m.on("click", (e)=>{
      L.DomEvent.stopPropagation(e);
      selectPoint(p, i, m);
    });
    dotMarkers.push(m);
    return m;
  });

  routeLayerGroup = L.featureGroup([line, ...markers]).addTo(routeMap);

  setTimeout(()=>{
    routeMap.invalidateSize();
    routeMap.fitBounds(routeLayerGroup.getBounds(), { padding: [30,30] });
  }, 50);
}

/* Click anywhere on the map -> automatically snaps to the nearest point */
function onMapClick(e){
  if(viewingLiveRun || !displayPoints.length) return;
  let best = -1, bestDist = Infinity;
  displayPoints.forEach((p,i)=>{
    const d = getDistance(p, { lat: e.latlng.lat, lon: e.latlng.lng });
    if(d < bestDist){ bestDist = d; best = i; }
  });
  if(best >= 0) selectPoint(displayPoints[best], best, dotMarkers[best]);
}

function resetMarkerStyle(idx){
  dotMarkers[idx].setStyle({ color: "#fff", fillColor: "#fff" });
}

function selectPoint(p, i, el){
  if(selected.length === 2){
    selected.forEach(s => resetMarkerStyle(s.i));
    highlightedRange.forEach(idx => resetMarkerStyle(idx));
    highlightedRange = [];
    selected = [];
  }
  selected.push({ p, i, el });
  el.setStyle({ color: "#4ade80", fillColor: "#4ade80" });
  updateInfo();
}

function updateInfo(){
  const info = document.getElementById("info");
  if(activeLineLayer){ routeMap.removeLayer(activeLineLayer); activeLineLayer = null; }

  if(selected.length === 1){
    const { p } = selected[0];
    info.innerHTML = `Time: ${formatTime(p.t)}`;
    info.style.display = "block";
    return;
  }

  if(selected.length === 2){
    let [a,b] = selected;
    if(a.i > b.i) [a,b] = [b,a];
    const dist = getDistance(a.p, b.p);
    const dt = b.p.t - a.p.t;
    const seg = displayPoints.slice(a.i, b.i+1).map(p=>[p.lat, p.lon]);
    activeLineLayer = L.polyline(seg, { color: "#4ade80", weight: 4 }).addTo(routeMap);

    highlightedRange = [];
    for(let idx = a.i; idx <= b.i; idx++){
      dotMarkers[idx].setStyle({ color: "#4ade80", fillColor: "#4ade80" });
      highlightedRange.push(idx);
    }

    info.innerHTML = `Time: ${formatTime(a.p.t)} &rarr; ${formatTime(b.p.t)}<br>Distance: ${dist.toFixed(0)} m<br>Duration: ${formatTime(dt)}`;
    info.style.display = "block";
  }
}

/* ---------- Delete & export ---------- */
document.getElementById("deleteBtn").onclick = ()=>{
  if(!currentRun) return;
  if(confirm("Delete this route?")){
    let runs = JSON.parse(localStorage.getItem("runs")||"[]");
    runs = runs.filter(r => r.start !== currentRun.start);
    localStorage.setItem("runs", JSON.stringify(runs));
    currentRun = null;
    nav("routes");
  }
};

document.getElementById("exportBtn").onclick = ()=>{
  if(!currentRun) return;
  const dataStr = JSON.stringify(currentRun, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const d = new Date(currentRun.start);
  const a = document.createElement("a");
  a.href = url;
  a.download = `runflow-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

/* ---------- Sample test route (Amersfoort) ---------- */
function seedTestRoute(){
  let runs = JSON.parse(localStorage.getItem("runs")||"[]");
  if(runs.length > 0) return;
  const centerLat = 52.1561, centerLon = 5.3878; // Amersfoort city center
  const n = 40;
  const points = [];
  for(let i=0; i<=n; i++){
    const angle = (i/n) * Math.PI * 2;
    const r = 0.009; // roughly a 1 km radius
    const lat = centerLat + r*Math.sin(angle);
    const lon = centerLon + (r*Math.cos(angle)) / Math.cos(centerLat*Math.PI/180);
    points.push({ lat, lon, t: i * 30000 }); // one point every 30s
  }
  const startTs = Date.now() - (24*60*60*1000);
  const testRun = { start: startTs, end: startTs + n*30000, points };
  runs.unshift(testRun);
  localStorage.setItem("runs", JSON.stringify(runs));
}

/* ---------- PWA service worker (optional offline shell caching) ---------- */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

/* ---------- Init ---------- */
seedTestRoute();
nav("run");
</script>
